<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwlc--SsASK-Uv1Fer3V5PtvjUge7WFKwSew-cH2GtFo4DbfW0pGbod6Zx8C5puZ7rYDQ/exec";
  let allParts = [];

  async function loadParts() {
    const res = await fetch(API_URL, { cache: "no-store" });
    allParts = await res.json();
    render();
  }

  function rowToPart(row) {
    const values = Object.values(row || {});
    return {
      code: values[0] || "",
      label: values[1] || "",
      models: values[2] || "",
      image: values[3] || "",
      status: values[4] || "",
      compatibility: values[5] || ""
    };
  }

  function render() {
    const q = document.getElementById("search").value.toLowerCase().trim();
    const statusFilter = document.getElementById("statusFilter").value;

    const filtered = allParts
      .map(rowToPart)
      .filter(part => {
        const matchesSearch =
          !q ||
          String(part.code).toLowerCase().includes(q) ||
          String(part.label).toLowerCase().includes(q) ||
          String(part.models).toLowerCase().includes(q);

        const matchesStatus =
          !statusFilter || String(part.status) === statusFilter;

        return matchesSearch && matchesStatus;
      });

    document.getElementById("meta").textContent = `${filtered.length} parts found`;

    document.getElementById("grid").innerHTML = filtered.map(part => {
      const statusClass = String(part.status).toLowerCase().includes("out") ? "out" : "in";

      return `
        <div class="card">
          <div class="imgbox">
            ${part.image ? `<img src="${part.image}" alt="${part.label}">` : `<span>No image</span>`}
          </div>
          <div class="content">
            <div class="code">${part.code}</div>
            <div class="label">${part.label}</div>
            <div class="models"><strong>Models:</strong> ${part.models}</div>
            <div class="status ${statusClass}">${part.status}</div>
            <div class="compat">${part.compatibility}</div>
          </div>
        </div>
      `;
    }).join("");
  }

  document.getElementById("search").addEventListener("input", render);
  document.getElementById("statusFilter").addEventListener("change", render);

  loadParts();
</script>
